version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://user:pass@postgres/assetintel
      REDIS_URL: redis://redis:6379
    volumes:
      - ../data:/app/data
      - ../models:/app/models

  ui:
    image: python:3.11-slim
    working_dir: /app
    command: >
      bash -c "pip install streamlit requests pillow -q &&
               streamlit run src/UI/app.py --server.port 8501"
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - ../src:/app/src

  postgres:
    image: ankane/pgvector
    environment:
      POSTGRES_DB: assetintel
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mlflow:
    image: ghcr.io/mlflow/mlflow
    command: mlflow server --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
    volumes:
      - ../mlruns:/mlflow/mlruns

volumes:
  pgdata: